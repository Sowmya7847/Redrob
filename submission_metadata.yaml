ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini to design the two-stage ranking architecture, implement the modular feature scorers (retrieval, product experience, continuous risk, and offline embedding utilities), and validate the outputs against the format and honeypot guidelines.

methodology_summary: |
  A robust two-stage ranking system designed for speed and offline compliance. Stage 1 streams candidates line-by-line using a broad retrieval score (skills, title relevance, keyword matches, and experience range) and isolates the top 3,000 candidates using a bounded min-heap. Stage 2 evaluates detailed Product Experience, continuous Risk, Behavioral, Trust, and Technical fits. It optimizes CPU load by only encoding semantic embeddings (via all-MiniLM-L6-v2 loaded offline from cache) for the top 500 pre-ranked candidates. Sort tie-breaks are strictly resolved alphabetically by candidate_id. Run-time is ~55 seconds on CPU with <150MB RAM footprint.

